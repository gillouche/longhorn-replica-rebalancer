name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    if: github.repository_owner == 'gillouche'
    outputs:
      is_safe: ${{ steps.gate.outputs.is_safe }}
    steps:
      - uses: actions/checkout@v6
      - uses: gillouche/homelab-ci/actions/security-gate@main
        id: gate

  test:
    needs: security-check
    if: needs.security-check.outputs.is_safe == 'true'
    runs-on: longhorn-replica-rebalancer-runner
    name: Test & Lint
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        run: pip install uv

      - name: Setup virtual environment
        run: |
          uv venv
          uv sync --all-extras

      - name: Run lints
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src/

      - name: Run tests with coverage
        run: |
          uv run pytest -v \
            --cov=rebalancer \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

  sonarqube:
    needs: [security-check, test]
    if: needs.security-check.outputs.is_safe == 'true'
    runs-on: longhorn-replica-rebalancer-runner
    name: SonarQube Analysis
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Nix Cache Profile
        uses: gillouche/homelab-ci/actions/setup-aws-profile@main
        with:
          profile: "nix"
          access-key-id: ${{ secrets.NIX_CACHE_ACCESS_KEY }}
          secret-access-key: ${{ secrets.NIX_CACHE_SECRET_KEY }}

      - name: Setup Nix Environment
        uses: gillouche/homelab-ci/actions/setup-nix-env@main

      - name: Generate coverage report
        run: |
          pip install uv
          uv venv
          uv sync --all-extras
          uv run pytest --cov=rebalancer --cov-report=xml:coverage.xml -q

      - name: Run SonarQube Scanner
        run: |
          nix develop .#ci --command sonar-scanner \
            -Dsonar.projectKey=longhorn-replica-rebalancer \
            -Dsonar.projectName=longhorn-replica-rebalancer \
            -Dsonar.sources=src/ \
            -Dsonar.tests=tests/ \
            -Dsonar.python.coverage.reportPaths=coverage.xml \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.exclusions=**/.venv/**,**/__pycache__/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          AWS_PROFILE: "nix"

  build:
    needs: [security-check, test]
    if: github.ref == 'refs/heads/main' && needs.security-check.outputs.is_safe == 'true'
    runs-on: longhorn-replica-rebalancer-runner
    name: Build & Push
    steps:
      - uses: actions/checkout@v6

      - name: Login to Nexus
        run: echo "${{ secrets.NEXUS_PASSWORD }}" | docker login nexus.gillouche.homelab -u "${{ secrets.NEXUS_USERNAME }}" --password-stdin

      - name: Build image
        run: |
          docker build \
            -t nexus.gillouche.homelab/longhorn-replica-rebalancer:${{ github.sha }} \
            -t nexus.gillouche.homelab/longhorn-replica-rebalancer:latest \
            .

      - name: Trivy scan
        uses: gillouche/homelab-ci/actions/trivy-scan@main
        with:
          image: nexus.gillouche.homelab/longhorn-replica-rebalancer:${{ github.sha }}
          discord-webhook: ${{ secrets.DISCORD_WEBHOOK_SECURITY_NOTIFICATIONS }}

      - name: Push image
        run: |
          docker push nexus.gillouche.homelab/longhorn-replica-rebalancer:${{ github.sha }}
          docker push nexus.gillouche.homelab/longhorn-replica-rebalancer:latest

      - name: Notify Discord
        if: always()
        uses: gillouche/homelab-ci/actions/discord-notify@main
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_GITHUB_ACTIONS }}
          status: ${{ job.status }}
          title: "longhorn-replica-rebalancer build"
          message: "Commit: ${{ github.sha }}"
